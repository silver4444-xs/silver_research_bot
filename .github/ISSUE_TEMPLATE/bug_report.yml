name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to fill out this bug report!"
  - type: input
    id: version
    attributes:
      label: Version
      description: "Which version of silver-research-bot are you running?"
      placeholder: "e.g., 0.7.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What happened? What did you expect to happen?"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "1. ... 2. ... 3. ..."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "OS, Python version, browser (if frontend issue)"
      placeholder: "e.g., Windows 11, Python 3.11.9, Chrome 126"
